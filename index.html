      <script>
         (function () {
            var s = localStorage.getItem('ac-theme');
            var d = window.matchMedia('(prefers-color-scheme: dark)').matches;
            document.documentElement.setAttribute(
               'data-theme',
               s === 'light' || s === 'dark' ? s : d ? 'dark' : 'light'
            );
         })();
      </script>
